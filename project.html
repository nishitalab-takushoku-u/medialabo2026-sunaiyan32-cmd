<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>プロジェクト課題</title>
  </head>
  <body>
    <h1>プロジェクト課題</h1>

    <p>
      私は「世界の天気」を選びました。ここでは大連市の天気の検索結果を表示します。
    </p>

    <h2>検索結果</h2>

    <section>
      <h3>大連市</h3>
      <p>現在の天気の情報を表にまとめました。</p>
      <table border="1">
        <tr>
          <th>項目</th>
          <th>内容</th>
        </tr>
        <tr>
          <td>都市名</td>
          <td>大連市</td>
        </tr>
        <tr>
          <td>天気</td>
          <td>晴れ</td>
        </tr>
        <tr>
          <td>最低気温</td>
          <td>18</td>
        </tr>
        <tr>
          <td>最高気温</td>
          <td>24</td>
        </tr>
        <tr>
          <td>湿度</td>
          <td>46%</td>
        </tr>
      </table>
    </section>

    <section>
      <h3>詳細データ</h3>
      <ul>
        <li>経度: 121.3741</li>
        <li>緯度: 38.9181</li>
        <li>風速: 3.4</li>
        <li>風向: 100</li></li>
      </ul>
    </section>

    <p><a href="index.html">成果ページへ戻る</a></p>
  </body>
</html>
